<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salah Times — Mesquite, TX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(16,185,129,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .wrap {
      width: 100%; max-width: 580px;
      padding: 2.5rem 1.5rem 3rem;
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 11px; letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #10b981;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 100px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.25rem;
      font-weight: 500;
    }
    h1 { font-size: 28px; font-weight: 600; color: #f0f0f0; margin-bottom: 0.3rem; }
    .sub { font-size: 14px; color: #555; margin-bottom: 0.4rem; }
    .current-time { font-size: 32px; font-weight: 500; color: #f0f0f0; font-variant-numeric: tabular-nums; margin: 0.5rem 0 0.2rem; }
    .current-date { font-size: 13px; color: #555; margin-bottom: 1.75rem; }
    hr { border: none; border-top: 1px solid #1a1a1a; margin: 1.5rem 0; }

    /* next prayer highlight */
    .next-box {
      background: linear-gradient(135deg, rgba(16,185,129,0.12), rgba(16,185,129,0.04));
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
    }
    .next-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #10b981; margin-bottom: 0.3rem; font-weight: 500; }
    .next-name { font-size: 22px; font-weight: 600; color: #f0f0f0; }
    .next-time-str { font-size: 14px; color: #888; margin-top: 0.2rem; }
    .next-countdown { text-align: right; }
    .next-countdown-num { font-size: 28px; font-weight: 600; color: #10b981; font-variant-numeric: tabular-nums; }
    .next-countdown-label { font-size: 11px; color: #555; margin-top: 0.2rem; letter-spacing: 0.08em; text-transform: uppercase; }

    /* prayer list */
    .prayers { display: flex; flex-direction: column; gap: 0.6rem; }
    .prayer-row {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 0.9rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.3s;
    }
    .prayer-row.active {
      border-color: rgba(16,185,129,0.4);
      background: rgba(16,185,129,0.05);
    }
    .prayer-row.passed { opacity: 0.4; }
    .prayer-left { display: flex; align-items: center; gap: 0.75rem; }
    .prayer-icon { font-size: 20px; }
    .prayer-name { font-size: 15px; font-weight: 500; color: #f0f0f0; }
    .prayer-arabic { font-size: 12px; color: #555; margin-top: 0.1rem; }
    .prayer-time-str { font-size: 16px; font-weight: 500; color: #ccc; font-variant-numeric: tabular-nums; }
    .prayer-row.active .prayer-time-str { color: #10b981; }
    .done-badge {
      font-size: 10px; color: #10b981;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 100px;
      padding: 0.2rem 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: none;
    }
    .prayer-row.passed .done-badge { display: inline-block; }

    .footer-links { margin-top: 2.5rem; display: flex; justify-content: center; gap: 1rem; }
    .btn-home {
      display: inline-block;
      padding: 0.65rem 1.25rem;
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      color: #888;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-home:hover { color: #f0f0f0; border-color: #333; }

    .quran-verse {
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-left: 3px solid #10b981;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-top: 1.5rem;
      font-size: 14px;
      color: #888;
      line-height: 1.7;
      font-style: italic;
      text-align: left;
    }
    .quran-verse span { color: #555; font-size: 12px; display: block; margin-top: 0.4rem; font-style: normal; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">🕌 Mesquite, Texas</div>
    <h1>Prayer Times</h1>
    <p class="sub">Calculated for Mesquite, TX · ISNA Method</p>
    <div class="current-time" id="current-time">--:-- --</div>
    <div class="current-date" id="current-date">--</div>

    <div class="next-box">
      <div>
        <div class="next-label">⏳ Next Prayer</div>
        <div class="next-name" id="next-name">--</div>
        <div class="next-time-str" id="next-time-str">--</div>
      </div>
      <div class="next-countdown">
        <div class="next-countdown-num" id="next-countdown">--:--</div>
        <div class="next-countdown-label">remaining</div>
      </div>
    </div>

    <div class="prayers" id="prayer-list"></div>

    <div class="quran-verse">
      "Indeed, prayer has been decreed upon the believers a decree of specified times."
      <span>— Surah An-Nisa 4:103</span>
    </div>

    <div class="footer-links">
      <a href="index.html" class="btn-home">🏠 Home</a>
    </div>
  </div>

<script>
// ── Prayer time calculation (ISNA method) ──────────────────────────
const LAT = 32.7668;   // Mesquite, TX
const LNG = -96.5992;
const TZ  = 'America/Chicago';

const PRAYERS = [
  { key: 'fajr',    name: 'Fajr',    arabic: 'الفجر',   icon: '🌙' },
  { key: 'dhuhr',   name: 'Dhuhr',   arabic: 'الظهر',   icon: '☀️' },
  { key: 'asr',     name: 'Asr',     arabic: 'العصر',   icon: '🌤️' },
  { key: 'maghrib', name: 'Maghrib', arabic: 'المغرب',  icon: '🌅' },
  { key: 'isha',    name: 'Isha',    arabic: 'العشاء',  icon: '🌟' },
];

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function fixAngle(a) { return a - 360 * Math.floor(a / 360); }
function fixHour(a)  { return a - 24  * Math.floor(a / 24);  }

function julianDay(date) {
  const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d
       + (m <= 2 ? -1 : 0) - 1524.5;
}

function sunPosition(jd) {
  const D = jd - 2451545.0;
  const g = fixAngle(357.529 + 0.98560028 * D);
  const q = fixAngle(280.459 + 0.98564736 * D);
  const L = fixAngle(q + 1.9150 * Math.sin(toRad(g)) + 0.020 * Math.sin(toRad(2 * g)));
  const e = 23.439 - 0.00000036 * D;
  const RA = toDeg(Math.atan2(Math.cos(toRad(e)) * Math.sin(toRad(L)), Math.cos(toRad(L)))) / 15;
  const dec = toDeg(Math.asin(Math.sin(toRad(e)) * Math.sin(toRad(L))));
  const EqT = q / 15 - fixHour(RA);
  return { dec, EqT };
}

function computeTimes(date) {
  const jd = julianDay(date);
  const { dec, EqT } = sunPosition(jd);

  // timezone offset in hours for that date
  const tzDate = new Date(date.toLocaleString('en-US', { timeZone: TZ }));
  const utcDate = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
  const tzOffset = (tzDate - utcDate) / 3600000;

  function timeSunAngle(angle, afterNoon) {
    const cosT = (Math.cos(toRad(angle)) - Math.sin(toRad(dec)) * Math.sin(toRad(LAT)))
                / (Math.cos(toRad(dec)) * Math.cos(toRad(LAT)));
    if (Math.abs(cosT) > 1) return null;
    const T = toDeg(Math.acos(cosT)) / 15;
    return afterNoon ? 12 + T - EqT - LNG / 15 + tzOffset
                     : 12 - T - EqT - LNG / 15 + tzOffset;
  }

  function asrTime(shadow) {
    const A = toDeg(Math.atan(1 / (shadow + Math.tan(toRad(Math.abs(dec - LAT))))));
    return timeSunAngle(-A, true);
  }

  const fajr    = timeSunAngle(-15, false);
  const dhuhr   = 12 - EqT - LNG / 15 + tzOffset + 0.5/60;
  const asr     = asrTime(1);
  const maghrib = timeSunAngle(-0.833, true);
  const isha    = timeSunAngle(-15, true);

  return { fajr, dhuhr, asr, maghrib, isha };
}

function decimalToTime(h) {
  if (h === null) return null;
  h = fixHour(h);
  const hh = Math.floor(h);
  const mm = Math.floor((h - hh) * 60);
  return { h: hh, m: mm };
}

function fmt12(t) {
  if (!t) return '--';
  const ampm = t.h >= 12 ? 'PM' : 'AM';
  const hh = t.h % 12 || 12;
  return `${hh}:${String(t.m).padStart(2,'0')} ${ampm}`;
}

function toMinutes(t) { return t ? t.h * 60 + t.m : null; }

function buildList(times) {
  const list = document.getElementById('prayer-list');
  list.innerHTML = '';
  PRAYERS.forEach(p => {
    const t = times[p.key];
    const row = document.createElement('div');
    row.className = 'prayer-row';
    row.id = 'row-' + p.key;
    row.innerHTML = `
      <div class="prayer-left">
        <span class="prayer-icon">${p.icon}</span>
        <div>
          <div class="prayer-name">${p.name}</div>
          <div class="prayer-arabic">${p.arabic}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <span class="prayer-time-str">${fmt12(t)}</span>
        <span class="done-badge">✓ done</span>
      </div>`;
    list.appendChild(row);
  });
}

function updateHighlights(times) {
  const now = new Date();
  const nowInTZ = new Date(now.toLocaleString('en-US', { timeZone: TZ }));
  const nowMins = nowInTZ.getHours() * 60 + nowInTZ.getMinutes();

  let nextKey = null, nextMins = Infinity;

  PRAYERS.forEach(p => {
    const t = times[p.key];
    const m = toMinutes(t);
    const row = document.getElementById('row-' + p.key);
    if (!row || m === null) return;
    row.className = 'prayer-row';
    if (m < nowMins) {
      row.classList.add('passed');
    } else if (m < nextMins) {
      nextMins = m;
      nextKey = p.key;
    }
  });

  if (nextKey) {
    document.getElementById('row-' + nextKey).classList.add('active');
    const np = PRAYERS.find(p => p.key === nextKey);
    document.getElementById('next-name').textContent = np.name;
    document.getElementById('next-time-str').textContent = fmt12(times[nextKey]);
    const diffMins = nextMins - nowMins;
    const h = Math.floor(diffMins / 60), m = diffMins % 60;
    document.getElementById('next-countdown').textContent =
      h > 0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${m}m`;
  } else {
    // all passed — next is fajr tomorrow
    document.getElementById('next-name').textContent = 'Fajr (tomorrow)';
    const t = times.fajr;
    document.getElementById('next-time-str').textContent = fmt12(t);
    const tmrMins = toMinutes(t) + 24 * 60;
    const diffMins = tmrMins - nowMins;
    const h = Math.floor(diffMins / 60), m = diffMins % 60;
    document.getElementById('next-countdown').textContent =
      h > 0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${m}m`;
  }
}

function updateClock() {
  const now = new Date();
  document.getElementById('current-time').textContent =
    now.toLocaleTimeString('en-US', { timeZone: TZ, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('current-date').textContent =
    now.toLocaleDateString('en-US', { timeZone: TZ, weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

let cachedTimes = null;
let lastDay = null;

function run() {
  const now = new Date();
  const todayStr = now.toLocaleDateString('en-US', { timeZone: TZ });

  if (todayStr !== lastDay) {
    const raw = computeTimes(now);
    cachedTimes = {};
    for (const k in raw) cachedTimes[k] = decimalToTime(raw[k]);
    lastDay = todayStr;
    buildList(cachedTimes);
  }

  updateClock();
  updateHighlights(cachedTimes);
}

run();
setInterval(run, 30000); // refresh every 30s
setInterval(updateClock, 1000);
</script>
</body>
</html>
